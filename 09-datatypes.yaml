- name: data types in ansible
  hosts: local
  connection: local
  vars:
    PROGRAM: "DEVSECOPS WITH AWS"
    DURATION: 20
    IS_LIVE: true
    DETAILS:
      TRAINER: "Siva Kumar"
      LAUNGUAGE: "Telugu"
    TOPICS:
      - LINUX
      - AWS
      - DOCKER
  tasks:
    - name: print the data types in screen
      ansible.builtin.debug:
        msg: |
          {{ PROGRAM }}
            {{ IS_LIVE }}\n
             {{ DETAILS }}\n
             {{ TOPICS }}
