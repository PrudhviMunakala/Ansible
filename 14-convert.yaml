- name: data types in ansible
  hosts: local
  connection: local
  vars:
    topics: Linux, shell, Mysql, Catalogue
    COURSE: "Devops with aws"
    tagslist:
      name: ansible
      project: roboshop
      component: Catalogue
  tasks:
    - name: greeting
      ansible.builtin.debug:
        msg: "{{ topics | split(',') }}"
    - name: convert map into list
      ansible.builtin.debug:
        msg: "{{ tagslist | dict2items }}"
    - name: convert to upper and lower
      ansible.builtin.debug:
        msg: { { COURSE | upper } }
    - name: conveert to upper and lower
      ansible.builtin.debug:
        msg: { { COURSE | lower } }
