- name: data types in ansible
  hosts: local
  connection: local
  vars:
    topics: Linux, shell, Mysql, Catalogue
    tagslist:
      name: ansible
      project: roboshop
      component: Catalogue
  tasks:
    - name: greeting
      ansible.builtin.debug:
        msg: "{{ topics | split(',') }}"
    - name: convert map into list
      ansible.builtin.debug:
        msg: "{{ tagslist | dict2items }}"
